<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRH Enterprises | Official Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">HRH ENTERPRISES</div>
        <ul>
            <li><a href="#" onclick="showPage('home')">Home</a></li>
            <li><a href="#" onclick="showPage('shop')">Shop</a></li>
            <li><a href="#" onclick="showPage('contact')">Contact Us</a></li>
        </ul>
    </nav>

    <section id="home" class="page">
        <div class="hero">
            <h1>Welcome to HRH ENTERPRISES</h1>
            <p>Best Quality Products at Your Doorstep</p>
            <button onclick="showPage('shop')">Start Shopping</button>
        </div>
    </section>

    <section id="shop" class="page" style="display:none;">
        <div class="search-bar">
            <input type="text" id="searchBox" placeholder="Search 15+ products..." onkeyup="searchItems()">
        </div>
        <div id="product-container" class="grid">
            </div>
    </section>

    <section id="contact" class="page" style="display:none;">
        <div class="contact-box">
            <h2>Contact Us</h2>
            <p>Location: Hyderabad, Pakistan</p>
            <p>Email: info@hrhenterprises.com</p>
            <a href="https://wa.me/923332736004" class="wa-btn">Chat on WhatsApp</a>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <p>© 2026 HRH ENTERPRISES. All Rights Reserved.</p>
            <p>📍 Hyderabad, Pakistan</p>
            <p>📞 0333-2736004</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
